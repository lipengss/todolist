<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusWorkspace - 宣传海报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0a0f;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }

  .poster {
    width: 720px; height: 1680px;
    background: #0b0c14;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }

  .content { flex: 1; display: flex; flex-direction: column; padding: 80px 64px; position: relative; z-index: 1; }

  /* Logo */
  .logo-row { display: flex; align-items: center; gap: 16px; margin-bottom: 100px; }
  .logo-icon {
    width: 44px; height: 44px;
    background: #fff;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 24px; height: 24px; stroke: #0b0c14; }
  .logo-text { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }

  /* Hero */
  .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .hero h1 {
    font-size: 64px; font-weight: 700; color: #fff;
    line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 28px;
  }
  .hero .subtitle {
    font-size: 22px; font-weight: 400; color: rgba(255,255,255,0.55);
    line-height: 1.5; letter-spacing: -0.2px; margin-bottom: 72px;
    max-width: 500px;
  }

  /* Features list */
  .feature-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 80px; }
  .feature-item {
    display: flex; align-items: center; gap: 20px;
    padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .feature-item:first-child { border-top: 1px solid rgba(255,255,255,0.06); }
  .feature-num { font-size: 13px; color: rgba(255,255,255,0.25); width: 24px; flex-shrink: 0; font-weight: 500; }
  .feature-item h3 { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -0.2px; flex-shrink: 0; width: 100px; }
  .feature-item p { font-size: 14px; color: rgba(255,255,255,0.4); line-height: 1.5; }

  /* Mockup area */
  .mock-section {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 24px;
    padding: 32px;
    margin-bottom: 80px;
  }
  .mock-header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .mock-dots { display: flex; gap: 6px; }
  .mock-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.15); }
  .mock-dot:first-child { background: rgba(255,255,255,0.3); }
  .mock-dot:last-child { background: rgba(255,255,255,0.3); }
  .mock-body { display: flex; gap: 16px; }
  .mock-sidebar {
    width: 140px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 6px;
  }
  .mock-nav { height: 28px; border-radius: 7px; display: flex; align-items: center; padding: 0 10px; gap: 8px; }
  .mock-nav.active { background: rgba(255,255,255,0.06); }
  .mock-nav-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0; }
  .mock-nav-line { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.04); }
  .mock-nav-label { font-size: 9px; color: rgba(255,255,255,0.3); margin-top: 14px; margin-bottom: 4px; padding-left: 2px; }
  .mock-main { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .mock-task {
    height: 28px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.04);
    display: flex; align-items: center; padding: 0 10px; gap: 10px;
  }
  .mock-check { width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid rgba(255,255,255,0.15); flex-shrink: 0; }
  .mock-check.done { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.15); }
  .mock-task-line { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.04); }
  .mock-badge { height: 14px; border-radius: 7px; padding: 0 8px; font-size: 8px; display: flex; align-items: center; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.2); }

  /* Footer */
  .footer { display: flex; flex-direction: column; gap: 12px; }
  .tech-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .tech-tag {
    font-size: 12px; color: rgba(255,255,255,0.3);
    padding: 6px 16px; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .cta { font-size: 16px; color: rgba(255,255,255,0.5); font-weight: 500; margin-top: 8px; }
</style>
</head>
<body>
<div class="poster">
  <div class="content">
    <!-- Header -->
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0b0c14" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <span class="logo-text">FocusWorkspace</span>
    </div>

    <!-- Hero -->
    <div class="hero">
      <h1>你的时间<br>值得专注</h1>
      <p class="subtitle">极简待办事项管理，跨平台桌面体验，让每一天都井井有条</p>

      <!-- Features -->
      <div class="feature-list">
        <div class="feature-item">
          <span class="feature-num">01</span>
          <h3>日历看板</h3>
          <p>月视图任务分布，一眼看清每日安排</p>
        </div>
        <div class="feature-item">
          <span class="feature-num">02</span>
          <h3>智能提醒</h3>
          <p>可配置重复通知，重要事项不遗漏</p>
        </div>
        <div class="feature-item">
          <span class="feature-num">03</span>
          <h3>键盘优先</h3>
          <p>全键盘操作流，高效无需离开键盘</p>
        </div>
        <div class="feature-item">
          <span class="feature-num">04</span>
          <h3>分类管理</h3>
          <p>自定义分类标签，工作生活灵活切换</p>
        </div>
        <div class="feature-item">
          <span class="feature-num">05</span>
          <h3>子任务拆分</h3>
          <p>大任务拆解为子任务，逐步完成目标</p>
        </div>
      </div>

      <!-- Mockup -->
      <div class="mock-section">
        <div class="mock-header">
          <div class="mock-dots"><div class="mock-dot"></div><div class="mock-dot"></div><div class="mock-dot"></div></div>
        </div>
        <div class="mock-body">
          <div class="mock-sidebar">
            <div class="mock-nav active"><div class="mock-nav-dot"></div><div class="mock-nav-line" style="width:40px"></div></div>
            <div class="mock-nav"><div class="mock-nav-dot"></div><div class="mock-nav-line" style="width:50px"></div></div>
            <div class="mock-nav"><div class="mock-nav-dot"></div><div class="mock-nav-line" style="width:35px"></div></div>
            <div class="mock-nav-label">分类</div>
            <div class="mock-nav"><div class="mock-nav-dot"></div><div class="mock-nav-line" style="width:45px"></div></div>
            <div class="mock-nav"><div class="mock-nav-dot"></div><div class="mock-nav-line" style="width:30px"></div></div>
          </div>
          <div class="mock-main">
            <div class="mock-task"><div class="mock-check"></div><div class="mock-task-line" style="width:65%"></div><div class="mock-badge">高</div></div>
            <div class="mock-task"><div class="mock-check"></div><div class="mock-task-line" style="width:80%"></div><div class="mock-badge">中</div></div>
            <div class="mock-task"><div class="mock-check"></div><div class="mock-task-line" style="width:50%"></div><div class="mock-badge">低</div></div>
            <div class="mock-task"><div class="mock-check done"></div><div class="mock-task-line" style="width:55%"></div><div class="mock-badge">完成</div></div>
            <div class="mock-task"><div class="mock-check done"></div><div class="mock-task-line" style="width:40%"></div><div class="mock-badge">完成</div></div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="tech-row">
          <span class="tech-tag">React 18</span>
          <span class="tech-tag">TypeScript</span>
          <span class="tech-tag">Electron</span>
          <span class="tech-tag">Tailwind CSS</span>
          <span class="tech-tag">Radix UI</span>
        </div>
        <p class="cta">Windows / macOS / Linux &nbsp;·&nbsp; 本地优先，隐私安全</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
