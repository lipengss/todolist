services:
  server:
    build:
      context: ./server
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin}
    volumes:
      - sqlite-data:/app/prisma
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  sqlite-data:
